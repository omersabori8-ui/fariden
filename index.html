<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیر  - ماشین حساب</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #007BFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    color: #FFD700;
    margin-top: 10px;
    font-weight: bold;
  }

  .menu {
    position: absolute;
    top: 10px;
    left: 10px;
  }

  .settings {
    position: absolute;
    top: 10px;
    right: 10px;
  }

  .menu-btn {
    background: rgb(28, 83, 70);
    color: #f9d805;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
  }

  .menu-box {
    display: none;
    margin-top: 5px;
    background: rgb(217, 190, 190);
    color: black;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
  }

  .calculator {
    background: #FFD700;
    padding: 20px;
    border-radius: 20px;
    margin-top: 10px;
  }

  #display {
    width: 100%;
    height: 60px;
    font-size: 22px;
    margin-bottom: 10px;
    text-align: right;
    padding: 10px;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 70px);
    gap: 10px;
  }

  button {
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: black;
    color: white;
  }

  .clear {
    grid-column: span 2;
    background: rgb(74, 95, 123);
  }

  .back {
    grid-column: span 2;
    background: orange;
  }

  .qr {
    margin-top: 20px;
    text-align: center;
  }

  .qr img {
    width: 170px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="menu">
  <div class="menu-btn" onclick="toggleMenu()">☰ خوش آمدید</div>
  <div class="menu-box" id="menuBox">
    این ویب‌ سایت از سیر - فرخاری میباشد و شما میتانین از این ویپ سایت استفاده کنین
  </div>
</div>

<div class="settings">
  <div class="menu-btn" onclick="toggleSettings()">⚙ تنظیمات</div>
  <div class="menu-box" id="settingsBox">
    <label>
      <input type="checkbox" onchange="toggleDark(this)">
      حالت شب
    </label>
  </div>
</div>
  
<h1>     <h1/>
  
<h1>سیر  - فرخاری 🇦🇫</h1>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">-</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button onclick="result()">=</button>
    <button onclick="add('+')">+</button>

    <button class="back" onclick="backspace()">⌫ پاک یک‌یک</button>
    <button class="clear" onclick="clearDisplay()">C پاک همه</button>
  </div>
</div>

<!-- QR CODE FIXED -->
<div class="qr">
  <p style="color:#FFD700;">اسکن کن برای باز شدن سایت</p>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=https://omersabori8-ui.github.io/fariden/">
</div>

<script>
  function add(v){ document.getElementById("display").value += v; }
  function clearDisplay(){ document.getElementById("display").value = ""; }
  function backspace(){
    let d = document.getElementById("display");
    d.value = d.value.slice(0,-1);
  }

  function result(){
    try{
      document.getElementById("display").value = eval(document.getElementById("display").value);
    }catch{
      alert("اشتباه است");
    }
  }

  function toggleMenu(){
    let m = document.getElementById("menuBox");
    m.style.display = (m.style.display==="block")?"none":"block";
  }

  function toggleSettings(){
    let s = document.getElementById("settingsBox");
    s.style.display = (s.style.display==="block")?"none":"block";
  }

  function toggleDark(el){
    document.body.classList.toggle("dark", el.checked);
  }
</script>

</body>
</html>
