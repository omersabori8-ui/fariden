<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیر جان - ماشین حساب</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #007BFF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    transition: 0.4s;
  }

  h1 {
    color: #FFD700;
    margin-top: 10px;
    font-weight: bold;
  }

  /* DARK MODE */
  body.dark {
    background-color: #111;
  }

  body.dark .calculator {
    background: #333;
  }

  body.dark button {
    background: #555;
  }

  body.dark .menu-box {
    background: #222;
    color: white;
  }

  body.dark h1 {
    color: #FFD700;
  }

  /* منو چپ */
  .menu {
    position: absolute;
    top: 10px;
    left: 10px;
  }

  /* تنظیمات راست */
  .settings {
    position: absolute;
    top: 10px;
    right: 10px;
  }

  .menu-btn {
    background: rgb(28, 83, 70);
    color: #f9d805;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
  }

  .menu-box {
    display: none;
    margin-top: 5px;
    background: rgb(217, 190, 190);
    color: #000000;
    padding: 15px;
    border-radius: 10px;
    width: 220px;
  }

  .whatsapp-top img {
    width: 100px;
    cursor: pointer;
  }

  .calculator {
    background: #FFD700;
    padding: 20px;
    border-radius: 20px;
    margin-top: 10px;
  }

  #display {
    width: 100%;
    height: 60px;
    font-size: 22px;
    margin-bottom: 10px;
    text-align: right;
    padding: 10px;
    color: black;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 70px);
    gap: 10px;
  }

  button {
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: black;
    color: white;
  }

  .clear {
    grid-column: span 2;
    background: rgb(74, 95, 123);
  }

  .back {
    grid-column: span 2;
    background: orange;
  }

  .qr {
    margin-top: 20px;
    text-align: center;
  }

  .qr img {
    width: 140px;
    border-radius: 10px;
  }
</style>
</head>

<body>

<!-- منو چپ -->
<div class="menu">
  <div class="menu-btn" onclick="toggleMenu()">☰ خوش آمدید</div>
  <div class="menu-box" id="menuBox">
      این ویپ سایت از سیر - فرخاری میباشه و شما میتانین از وسپ سایت سیر -فرخاری استفاده کنین 
  </div>
</div>

<!-- تنظیمات راست -->
<div class="settings">
  <div class="menu-btn" onclick="toggleSettings()">⚙ تنظیمات</div>
  <div class="menu-box" id="settingsBox">
    <label>
      <input type="checkbox" onchange="toggleDark(this)">
      حالت شب
    </label>
  </div>
</div>



  <h1>   <h1/>
<h1>سیر جان - فرخاری</h1>
<h1>🇦🇫</h1>

<div class="whatsapp-top">
  <a href="https://wa.me/93705567538" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
  </a>
</div>

<div class="calculator">
  <input type="text" id="display" readonly>

  <div class="buttons">
    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">÷</button>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">×</button>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">-</button>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button onclick="result()">=</button>
    <button onclick="add('+')">+</button>

    <button class="back" onclick="backspace()">⌫ پاک یک‌یک</button>
    <button class="clear" onclick="clearDisplay()">C پاک همه</button>
  </div>
</div>

<div class="qr">
  <p style="color:#FFD700;">اسکن کن برای باز شدن سایت</p>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=https://YOUR-SITE-LINK">
</div>

<script>
  function add(val) {
    document.getElementById('display').value += val;
  }

  function clearDisplay() {
    document.getElementById('display').value = '';
  }

  function backspace() {
    let display = document.getElementById('display');
    display.value = display.value.slice(0, -1);
  }

  function result() {
    try {
      let exp = document.getElementById('display').value;
      let res = eval(exp);
      document.getElementById('display').value = res;
    } catch (e) {
      alert('اشتباه است');
    }
  }

  function toggleMenu() {
    let m = document.getElementById('menuBox');
    m.style.display = (m.style.display === "block") ? "none" : "block";
  }

  function toggleSettings() {
    let s = document.getElementById('settingsBox');
    s.style.display = (s.style.display === "block") ? "none" : "block";
  }

  function toggleDark(el) {
    document.body.classList.toggle("dark", el.checked);
  }
</script>

</body>
</html>
